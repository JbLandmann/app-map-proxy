name: Deploy app-map proxy

on:
  push:
    branches: [main]
    paths:
      - 'compose.yml'
      - 'web.conf'

env:
  IMAGE: app-map-proxy

jobs:
  deploy:
    name: Deploy proxy config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create folder on server
        uses: appleboy/ssh-action@v1.2.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.PRIVATE_KEY }}
          port: ${{ secrets.PORT || 22 }}
          script: |
            mkdir -p /opt/applications/app-map/${{ env.IMAGE }}

      - name: Copy config files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.PRIVATE_KEY }}
          port: ${{ secrets.PORT || 22 }}
          source: "compose.yml,web.conf"
          target: /opt/applications/app-map/${{ env.IMAGE }}

      - name: Deploy container
        uses: appleboy/ssh-action@v1.2.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.PRIVATE_KEY }}
          port: ${{ secrets.PORT || 22 }}
          script: |
            docker network create app-map-network || true
            cd /opt/applications/app-map/${{ env.IMAGE }}
            test -f /etc/app-map/back.env || { echo "❌ Missing /etc/app-map/back.env"; exit 1; }
            test -f /etc/letsencrypt/live/vps-954b32b8.vps.ovh.net/fullchain.pem || { echo "❌ Missing LetsEncrypt certificate on VPS"; exit 1; }
            test -f /etc/letsencrypt/live/vps-954b32b8.vps.ovh.net/privkey.pem || { echo "❌ Missing LetsEncrypt private key on VPS"; exit 1; }
            mkdir -p /var/www/certbot
            docker compose --env-file /etc/app-map/back.env -f compose.yml down
            docker compose --env-file /etc/app-map/back.env -f compose.yml pull
            docker compose --env-file /etc/app-map/back.env -f compose.yml up -d
            docker image prune -f

      - name: Verify nginx config
        uses: appleboy/ssh-action@v1.2.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.PRIVATE_KEY }}
          port: ${{ secrets.PORT || 22 }}
          script: |
            sleep 3
            docker exec app-map-proxy nginx -t
            echo "✅ Nginx config valid"
