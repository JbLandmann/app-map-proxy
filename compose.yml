services:
  proxy:
    image: nginx:1.27-alpine
    container_name: app-map-proxy
    restart: always
    environment:
      REQUEST_API_KEY: ${REQUEST_API_KEY}
      NGINX_ENVSUBST_FILTER: ^REQUEST_API_KEY$
    ports: 
      - 80:80      
      - 443:443    
    volumes:
      - ./web.conf:/etc/nginx/templates/default.conf.template:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - app-map-network

networks:
  app-map-network:
    external: true
    name: app-map-network